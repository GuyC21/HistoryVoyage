version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: historyvoyage_backend_prod
    restart: always
    environment:
      # These must be provided in the environment or an .env file when deploying
      - SECRET_KEY=${SECRET_KEY:-}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - ALLOWED_CORS_ORIGINS=${ALLOWED_CORS_ORIGINS:-*}
      - DATABASE_URL=${DATABASE_URL:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Pass build args from the environment when building the image
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY:-}
    container_name: historyvoyage_frontend_prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
